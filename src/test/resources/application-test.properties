# Test Profile - Disable Redis & External Services

# ========================================
# DISABLE REDIS (không c?n Redis khi test)
# ========================================
spring.data.redis.host=

# ========================================
# DATABASE (use H2 for testing)
# ========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ========================================
# DISABLE LIQUIBASE (migrations not needed for test)
# ========================================
spring.liquibase.enabled=false

# ========================================
# DISABLE RATE LIMITING (not needed for unit test)
# ========================================
app.rate-limiting.enabled=false

# ========================================
# DISABLE EMAIL (mock SMTP)
# ========================================
spring.mail.host=
spring.mail.port=0

# ========================================
# JPA/HIBERNATE
# ========================================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================================
# LOGGING
# ========================================
logging.level.root=WARN
logging.level.com.mindrevol=DEBUG

# Security config dependency for context startup
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# ========================================
# JWT CONFIGURATION
# ========================================
app.jwt.secret=test-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hs256
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=604800000

# ========================================
# 2FA CONFIGURATION
# ========================================
app.two-factor.issuer=MindRevolTest
app.two-factor.challenge-ttl-seconds=300
app.two-factor.verify-window=1
app.two-factor.backup-code-count=8

# ========================================
# REGISTRATION & OTP
# ========================================
app.registration.temp-data-ttl-minutes=30
app.registration.otp-validity-minutes=10
app.registration.otp-length=6
app.mail.from=noreply@test.com

# ========================================
# EXTERNAL SERVICES (TEST DUMMIES)
# ========================================
firebase.enabled=false
firebase.credentials.base64=
tiktok.client-key=test-key
tiktok.client-secret=test-secret
google.client-id=test-client-id
google.client-secret=test-client-secret
facebook.app-id=test-app-id
imagekit.upload-url=https://upload.imagekit.io/api/v1/files/upload
imagekit.url-endpoint=https://ik.imagekit.io/test
imagekit.public-key=test-key
imagekit.private-key=test-key
app.payment.sepay-token=test-token

# ========================================
# EMAIL API (TEST DUMMIES)
# ========================================
app.email.api-key=test-api-key
app.email.sender-email=noreply@test.local
app.email.sender-name=MindRevol Test
spring.mail.username=test
spring.mail.password=test
