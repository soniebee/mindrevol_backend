spring.application.name=mindrevol-backend-core

# ========================================
# DATABASE CONFIGURATION
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/mindrevol_db
spring.datasource.username=postgres
spring.datasource.password=1
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================================
# REDIS CONFIGURATION
# ========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.ssl.enabled=false

# ========================================
# JWT CONFIGURATION
# ========================================
app.jwt.secret=your-secret-key-must-be-at-least-256-bits-long-for-hs512-algorithm-change-this-in-production
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000

# ========================================
# EMAIL CONFIGURATION (Gmail Example)
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================================
# CORS CONFIGURATION
# ========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8080

# ========================================
# LOGGING
# ========================================
logging.level.com.mindrevol=DEBUG
logging.level.org.springframework.security=DEBUG


