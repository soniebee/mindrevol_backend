spring.application.name=mindrevol-backend-core

# ========================================
# ACTIVE PROFILE SELECTION
# ========================================
# dev  = H2 in-memory database (no installation needed)
# prod = PostgreSQL database (requires PostgreSQL running)
spring.profiles.active=dev

# ========================================
# COMMON CONFIGURATION (shared across all profiles)
# ========================================

# ========================================
# JWT CONFIGURATION
# ========================================
app.jwt.secret=your-secret-key-must-be-at-least-256-bits-long-for-hs512-algorithm-change-this-in-production
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000

# ========================================
# REGISTRATION & OTP CONFIGURATION
# ========================================
app.registration.temp-data-ttl-minutes=30
app.registration.otp-validity-minutes=10
app.registration.otp-length=6
app.mail.from=noreply@mindrevol.com

# Note: Profile-specific configs (database, redis, email, etc.)
# are in application-dev.properties and application-prod.properties
