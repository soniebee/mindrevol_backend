# ========================================
# DEVELOPMENT PROFILE - H2 In-Memory Database
# ========================================
# This profile allows you to run the app WITHOUT PostgreSQL
# Data will be lost when application restarts

# ========================================
# H2 DATABASE CONFIGURATION
# ========================================
spring.datasource.url=jdbc:h2:mem:mindrevol_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update


# Enable H2 Console for debugging (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# LIQUIBASE - DISABLED for H2 Dev Mode
# ========================================
spring.liquibase.enabled=false

# ========================================
# FIREBASE - DISABLED for Dev Mode
# ========================================
firebase.enabled=false

# ========================================
# REDIS CONFIGURATION - DISABLED
# ========================================
# Redis is optional in development
app.rate-limiting.enabled=true

# ========================================
# RATE LIMITING CONFIGURATION
# ========================================
app.ratelimit.login.limit=5
app.ratelimit.login.duration-min=15
app.ratelimit.general.limit=100
app.ratelimit.general.duration-min=1
app.ratelimit.strict.limit=3
app.ratelimit.strict.duration-hour=1
app.ratelimit.otp.limit=5
app.ratelimit.otp.duration-min=1

# ========================================
# JWT CONFIGURATION
# ========================================
app.jwt.secret=your-secret-key-must-be-at-least-256-bits-long-for-hs512-algorithm-change-this-in-production
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000

# ========================================
# EMAIL CONFIGURATION (Gmail Example)
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================================
# CORS CONFIGURATION
# ========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8080

# ========================================
# LOGGING
# ========================================
logging.level.com.mindrevol=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


