
spring.datasource.url=jdbc:postgresql://localhost:5432/mindrevol_db_dev
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=511007

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ========================================
# LIQUIBASE - DISABLED for H2 Dev Mode
# ========================================
spring.liquibase.enabled=false

# ========================================
# FIREBASE - DISABLED for Dev Mode
# ========================================
firebase.enabled=true


# --- 2. LOCAL REDIS ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
# Local Redis thường không bật SSL
spring.data.redis.ssl.enabled=false

# --- 4. RELAXED SECURITY ---
# Cho phép frontend local gọi vào
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://localhost:5173

