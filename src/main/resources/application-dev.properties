spring.datasource.url=jdbc:postgresql://localhost:5432/mindrevol_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ========================================
# LIQUIBASE - DISABLED for H2 Dev Mode
# ========================================
spring.liquibase.enabled=false

# ========================================
# JWT CONFIGURATION
# ========================================
app.jwt.secret=your-super-secret-jwt-key-minimum-256-bits-for-hs256-algorithm-production
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=604800000

# ========================================
# FIREBASE - DISABLED for Dev Mode
# ========================================
firebase.enabled=false
firebase.credentials.base64=

# --- 2. LOCAL REDIS ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
# Local Redis th??ng kh?ng b?t SSL
spring.data.redis.ssl.enabled=false

# --- 4. RELAXED SECURITY ---
# Cho ph?p frontend local g?i v?o
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://localhost:5173

# ========================================
# TIKTOK CONFIGURATION
# ========================================
tiktok.client-key=${TIKTOK_CLIENT_KEY:test-key}
tiktok.client-secret=${TIKTOK_CLIENT_SECRET:test-secret}

# ========================================
# IMAGEKIT CONFIGURATION
# ========================================
imagekit.upload-url=https://upload.imagekit.io/api/v1/files/upload
imagekit.public-key=${IMAGEKIT_PUBLIC_KEY:test-key}
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:test-key}

# ========================================
# GOOGLE & FACEBOOK OAUTH
# ========================================
google.client-id=${GOOGLE_CLIENT_ID:test-client-id}
facebook.app-id=${FACEBOOK_APP_ID:test-app-id}

# ========================================
# EMAIL API (DEV DEFAULTS)
# ========================================
app.email.api-key=test-email-api-key
app.email.sender-email=noreply@local.dev
app.email.sender-name=MindRevol Dev