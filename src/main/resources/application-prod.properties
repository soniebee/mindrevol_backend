# --- 1. PRODUCTION DATABASE (Render) ---
# CÃc giÃ tr\u1ECB ${...} s\u1EBD \u0111\u01B0\u1EE3c l\u1EA5y t\u1EEB m\u1EE5c Environment Variables trõn Render
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
# Upstash B\u1EAET BU\u1ED8C ph\u1EA3i cµ SSL
spring.data.redis.ssl.enabled=true

# --- 2. LOGGING (Gi\u1EA3m b\u1EDBt log rÃc) ---
# Ch\u1EC9 hi\u1EC7n log t\u1EEB m\u1EE9c INFO tr\u1EDF lõn (b\u1ECF qua DEBUG, TRACE)
logging.level.root=INFO

# N\u1EBFu mu\u1ED1n t\u1EAFt b\u1EDBt log c\u1EE7a Hibernate (cãu SQL in ra nhi\u1EC1u quÃ)
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Gi\u1EEF log INFO cho module c\u1EE7a mšnh \u0111\u1EC3 d\u1EC5 ki\u1EC3m tra
logging.level.com.mindrevol=INFO

# T\u1EAFt log SQL \u0111\u1EC3 \u0111\u1EE1 r\u1ED1i m\u1EAFt vÁ t\u0103ng t\u1ED1c \u0111\u1ED9
spring.jpa.show-sql=false

# --- 3. SECURITY STRICT ---
# Ch\u1EC9 cho phÕp domain th\u1EADt c\u1EE7a Frontend g\u1ECDi vÁo (VD: https://mindrevol.vercel.app)
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# ==========================================
# SePay Payment Gateway Configuration (PROD)
# L\u1EA5y t\u1EEB bi\u1EBFn m¶i tr\u01B0\u1EDDng \u0111\u1EC3 \u1EA9n m\u1EADt kh\u1EA9u
# ==========================================
sepay.bank-account=${SEPAY_BANK_ACCOUNT}
sepay.bank-name=${SEPAY_BANK_NAME}
sepay.account-name=${SEPAY_ACCOUNT_NAME}
sepay.prefix=${SEPAY_PREFIX}
sepay.webhook-token=${SEPAY_WEBHOOK_TOKEN}