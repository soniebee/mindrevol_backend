# ========================================
# PRODUCTION PROFILE - PostgreSQL Database
# ========================================
# This profile requires PostgreSQL to be installed and running

# ========================================
# POSTGRESQL DATABASE CONFIGURATION
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/mindrevol_db
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# LIQUIBASE - ENABLED for Production
# ========================================
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ========================================
# REDIS CONFIGURATION
# ========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.ssl.enabled=false

# Enable rate limiting in production
app.rate-limiting.enabled=true

# ========================================
# RATE LIMITING CONFIGURATION
# ========================================
app.ratelimit.login.limit=5
app.ratelimit.login.duration-min=15
app.ratelimit.general.limit=100
app.ratelimit.general.duration-min=1
app.ratelimit.strict.limit=3
app.ratelimit.strict.duration-hour=1
app.ratelimit.otp.limit=5
app.ratelimit.otp.duration-min=1

# ========================================
# JWT CONFIGURATION
# ========================================
app.jwt.secret=CHANGE-THIS-TO-A-SECURE-SECRET-KEY-IN-PRODUCTION-AT-LEAST-512-BITS
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000

# ========================================
# EMAIL CONFIGURATION
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bill.thanh.son@gmail.com
spring.mail.password=hvap zsru myrq kpcc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================================
# CORS CONFIGURATION
# ========================================
app.cors.allowed-origins=https://yourdomain.com,https://www.yourdomain.com

# ========================================
# SERVER CONFIGURATION
# ========================================
server.port=8080

# ========================================
# LOGGING
# ========================================
logging.level.com.mindrevol=INFO
logging.level.org.springframework.security=WARN

